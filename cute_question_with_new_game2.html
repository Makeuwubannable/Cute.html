<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Question</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --pink: #ff4d8d;
      --pink-soft: #ff9abf;
      --text: #5a2440;
      --accent: #d91f6d;
      --bg1: #ffe4ef;
      --bg2: #fff8fc;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
      color: var(--text);
    }

    .card {
      width: min(92vw, 760px);
      padding: 34px 24px 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 20px 60px rgba(255, 77, 141, 0.18);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 18px;
      font-size: 1.05rem;
    }

    .buttons {
      position: relative;
      height: 160px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 28px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, left 0.2s ease, top 0.2s ease, opacity 0.2s ease;
      user-select: none;
    }

    #yesBtn {
      position: absolute;
      left: 34%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--pink);
      color: white;
      box-shadow: 0 12px 24px rgba(255, 77, 141, 0.28);
      z-index: 2;
    }

    #yesBtn:hover { transform: translate(-50%, -50%) scale(1.05); }

    #noBtn {
      position: absolute;
      left: 66%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: var(--text);
      border: 2px solid var(--pink-soft);
      box-shadow: 0 10px 18px rgba(255, 143, 184, 0.18);
      z-index: 1;
    }

    .message {
      min-height: 28px;
      margin-top: 16px;
      font-weight: 600;
      color: #8b295b;
      font-size: 1.02rem;
    }

    .award {
      display: none;
      margin: 22px auto 0;
      width: min(92%, 440px);
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: linear-gradient(135deg, #ffffff, #fff0f7);
      border: 2px solid rgba(255, 77, 141, 0.24);
      box-shadow: 0 14px 34px rgba(255, 77, 141, 0.16);
      animation: popIn 0.35s ease;
    }

    .award.show { display: block; }

    .medal {
      font-size: 3rem;
      display: block;
      margin-bottom: 6px;
    }

    .award h2 {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 1.45rem;
    }

    .award p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .confetti-piece {
      position: fixed;
      top: -16px;
      width: 10px;
      height: 16px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 9999;
      animation-name: fall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.95;
      }
    }

    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes wiggle {
      from { transform: translate(-50%, -50%) rotate(-3deg) translateY(0); }
      to { transform: translate(-50%, -50%) rotate(3deg) translateY(-4px); }
    }

    .babi-game {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      pointer-events: auto;
      background: rgba(255, 248, 252, 0.15);
    }

    .babi-game.show {
      display: block;
    }

    .babi {
      width: 120px;
      height: 120px;
      position: fixed;
      left: 50vw;
      top: 50vh;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #ffb7cb;
      cursor: pointer;
      box-shadow: inset 0 -8px 0 rgba(255,255,255,0.18), 0 10px 20px rgba(255, 143, 184, 0.22);
      animation: wiggle 0.25s ease-in-out infinite alternate;
      z-index: 2001;
    }

    .babi::before,
    .babi::after {
      content: '';
      position: absolute;
      top: -8px;
      width: 26px;
      height: 26px;
      background: #ff9fbc;
      border-radius: 8px 8px 0 0;
      transform: rotate(45deg);
    }

    .babi::before { left: 18px; }
    .babi::after { right: 18px; }

    .eye {
      position: absolute;
      top: 42px;
      width: 10px;
      height: 10px;
      background: var(--text);
      border-radius: 50%;
    }

    .eye.left { left: 36px; }
    .eye.right { right: 36px; }

    .snout {
      position: absolute;
      left: 50%;
      top: 60px;
      transform: translateX(-50%);
      width: 50px;
      height: 34px;
      background: #ff9abf;
      border-radius: 18px;
      border: 3px solid rgba(90, 36, 64, 0.08);
    }

    .snout::before,
    .snout::after {
      content: '';
      position: absolute;
      top: 12px;
      width: 7px;
      height: 10px;
      background: var(--text);
      border-radius: 50%;
    }

    .snout::before { left: 12px; }
    .snout::after { right: 12px; }

    .babi-game h3 {
      margin: 160px 0 8px;
      color: var(--accent);
      font-size: 1.25rem;
      text-align: center;
    }

    .babi-game p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.4;
      text-align: center;
    }

    .seek-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: rgba(255, 240, 247, 0.86);
      backdrop-filter: blur(5px);
      padding: 20px;
    }

    .seek-overlay.show { display: grid; place-items: center; }

    .seek-panel {
      width: min(95vw, 980px);
      max-height: 92vh;
      overflow: auto;
      background: rgba(255,255,255,0.96);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(255, 77, 141, 0.22);
      border: 2px solid rgba(255, 77, 141, 0.14);
      padding: 22px;
    }

    .seek-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      text-align: left;
    }

    .seek-top h2 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .seek-top p {
      margin: 4px 0 0;
      color: #7b3456;
    }

    .seek-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 12px 18px;
      font-size: 0.98rem;
    }

    .seek-message {
      margin: 0 0 14px;
      min-height: 24px;
      font-weight: 600;
      color: #8b295b;
    }

    .seek-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
      gap: 12px;
    }

    .seek-cell {
      height: 74px;
      padding: 0;
      border-radius: 20px;
      font-size: 0.98rem;
      box-shadow: 0 8px 18px rgba(255, 77, 141, 0.12);
      border: 2px solid rgba(255, 154, 191, 0.7);
    }

    .seek-cell.yes {
      background: #fff6fa;
      color: #c13b72;
    }

    .seek-cell.no {
      background: linear-gradient(135deg, #ff4d8d, #ff74a4);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 22px rgba(255, 77, 141, 0.26);
    }

    .seek-cell.found {
      outline: 4px solid rgba(255, 77, 141, 0.18);
      transform: scale(1.04);
    }

    @media (max-width: 700px) {
      .card { padding: 28px 16px 30px; }
      .buttons { height: 180px; }
      #yesBtn { left: 28%; }
      #noBtn { left: 72%; }
      .seek-panel { padding: 18px; }
      .seek-cell { height: 68px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Are you the cutest girl in the world?</h1>
    <p>Choose wisely.</p>

    <div class="buttons">
      <button id="yesBtn" type="button">Yes</button>
      <button id="noBtn" type="button">No</button>
    </div>

    <div class="message" id="message"></div>

    <div class="babi-game" id="babiGame" aria-hidden="true">
      <div class="babi" id="babi" title="Click me to get the no button back!">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="snout"></div>
      </div>
      <h3>The babi stole the no button!</h3>
      <p>Click on the babi to get the no button back.</p>
    </div>

    <div class="award" id="award">
      <span class="medal">🏆</span>
      <h2>Award Unlocked</h2>
      <p>You are officially the cutest girl in the world.</p>
    </div>
  </div>

  <div class="seek-overlay" id="seekOverlay" aria-hidden="true">
    <div class="seek-panel">
      <div class="seek-top">
        <div>
          <h2>Find the No</h2>
          <p>It is hiding among a bunch of yes buttons. Click the no button to win.</p>
        </div>
        <div class="seek-actions">
          <button class="small-btn" id="shuffleSeekBtn" type="button">Shuffle</button>
          <button class="small-btn" id="closeSeekBtn" type="button">Close</button>
        </div>
      </div>
      <div class="seek-message" id="seekMessage"></div>
      <div class="seek-board" id="seekBoard"></div>

  </div>

    function launchConfetti() {
      const colors = ['#ff4d8d', '#ffd166', '#8ecae6', '#a0e7e5', '#cdb4db', '#ff9f1c', '#f72585'];
      const count = 140;

        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];

    }

      babiY = Math.random() * (window.innerHeight - 140);
      babi.style.left = babiX + 'px';
      babi.style.top = babiY + 'px';
      babi.style.transform = 'none';

      if (babiMoveTimer) clearInterval(babiMoveTimer);
      babiMoveTimer = setInterval(() => {
        const maxX = window.innerWidth - 140;
        const maxY = window.innerHeight - 140;
        babiX = Math.max(0, Math.min(maxX, babiX + (Math.random() * 260 - 130)));
        babiY = Math.max(0, Math.min(maxY, babiY + (Math.random() * 260 - 130)));
        babi.style.left = babiX + 'px';
        babi.style.top = babiY + 'px';
        babi.style.transform = 'none';
      }, 220);
    }

    function openSeekGame() {
      noButtonStolen = true;
      noBtn.style.display = 'none';
      seekOverlay.classList.add('show');
      seekOverlay.setAttribute('aria-hidden', 'false');
      renderSeekGame();
      seekMessage.textContent = 'Ready? Find the only no button.';
    }

    function shuffleArray(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function renderSeekGame() {
      seekBoard.innerHTML = '';
      seekFound = false;

      const total = 40;
      const labels = Array(total - 1).fill('Yes');
      const cells = [...labels, 'No'];
      shuffleArray(cells);

      cells.forEach((label) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'seek-cell ' + (label === 'No' ? 'no' : 'yes');
        btn.textContent = label;

        btn.addEventListener('click', () => {
          if (seekFound) return;

          if (label === 'No') {
            seekFound = true;
            btn.classList.add('found');
            btn.textContent = 'Found!';
            seekMessage.textContent = 'You found the no button. Legendary.';
            launchConfetti();
            setTimeout(() => {
              resetNoButton();
              message.textContent = 'You found the no button in the new game 💖';
            }, 900);
            return;
          }

          seekMessage.textContent = 'That was a yes button. Keep looking.';
          btn.animate(
            [{ transform: 'scale(1)' }, { transform: 'scale(0.95)' }, { transform: 'scale(1)' }],
            { duration: 180, easing: 'ease-out' }
          );
          renderSeekGame();
        });

        seekBoard.appendChild(btn);
      });
    }

    function triggerRandomSpecialGame() {
      if (Math.random() < 0.5) {
        startBabiGame();
      } else {
        openSeekGame();
      }
    }

    yesBtn.addEventListener('click', () => {
      message.textContent = 'You are 100% correct 💖';
      award.classList.add('show');
      launchConfetti();
      yesBtn.disabled = true;
      noBtn.disabled = true;
      noBtn.style.opacity = '0.65';
      noBtn.style.cursor = 'not-allowed';
      yesBtn.textContent = 'Obviously yes';
    });

    noBtn.addEventListener('click', () => {
      if (noButtonStolen) return;

      noClicks += 1;
      message.textContent = noMessages[messageIndex % noMessages.length];
      messageIndex += 1;

      if (noClicks >= 10) {
        triggerRandomSpecialGame();
        return;
      }

      const container = document.querySelector('.buttons');
      const containerRect = container.getBoundingClientRect();
      const noRect = noBtn.getBoundingClientRect();
      const padding = 12;
      const maxX = containerRect.width - noRect.width - padding;
      const maxY = containerRect.height - noRect.height - padding;

      let x = 0;
      let y = 0;
      let tries = 0;

      function overlapsYes(testX, testY) {
        const noLeft = testX;
        const noTop = testY;
        const noRight = testX + noRect.width;
        const noBottom = testY + noRect.height;

        const yesLeft = yesBtn.offsetLeft - yesBtn.offsetWidth / 2;
        const yesTop = yesBtn.offsetTop - yesBtn.offsetHeight / 2;
        const yesRight = yesLeft + yesBtn.offsetWidth;
        const yesBottom = yesTop + yesBtn.offsetHeight;

        return !(noRight < yesLeft || noLeft > yesRight || noBottom < yesTop || noTop > yesBottom);
      }

      do {
        x = Math.max(padding, Math.random() * maxX);
        y = Math.max(padding, Math.random() * maxY);
        tries += 1;
      } while (overlapsYes(x, y) && tries < 25);

      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
      noBtn.style.transform = 'none';
    });

    babi.addEventListener('click', () => {
      resetNoButton();
    });

    shuffleSeekBtn.addEventListener('click', () => {
      if (!seekOverlay.classList.contains('show')) return;
      renderSeekGame();
      seekMessage.textContent = 'Shuffled. Find it again.';
    });

    closeSeekBtn.addEventListener('click', () => {
      resetNoButton();
    });

    seekOverlay.addEventListener('click', (event) => {
      if (event.target === seekOverlay) {
        resetNoButton();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && (seekOverlay.classList.contains('show') || babiGame.classList.contains('show'))) {
        resetNoButton();
      }
    });
  </script>
</body>
</html>
